name: AI Auto Update Content

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gemini Build
        uses: google-gemini/generate-content-action@v1
        id: gemini
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          # 説明抜きで「コードだけ」を出すように超厳格に指示
          prompt: "index.htmlの完全なコードのみを出力してください。マークダウン（```）や説明文は一切含めず、<!DOCTYPE html>から始めてください。中略は禁止。画像はAmazonの実画像URLにすること。"

      - name: Clean and Save
        run: |
          # AIがもし```htmlなどをつけても、それを除去して保存する処理
          echo "${{ steps.gemini.outputs.content }}" > raw.txt
          sed -i '/^```/d' raw.txt
          cat raw.txt > index.html
          
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@example.com"
          git add index.html
          git commit -m "AI-Bot: index.htmlの自動更新に成功" || exit 0
          git push origin main
