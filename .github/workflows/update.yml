name: AI Auto Update Content

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間の午前9時に自動実行
  workflow_dispatch:      # 手動で今すぐ実行したい時用

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Content with AI logic
        run: |
          # ここに「最新トレンドを検索してHTMLを書き換える」プログラムが走ります
          # 今回はテストとして、サイトの更新日時を自動で書き換える命令を入れます
          DATE=$(date +'%Y-%m-%d %H:%M')
          sed -i "s/2026年、私たちの時間は/最終更新: $DATE \n その「家事」は、/g" index.html

      - name: Commit and Push changes
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@example.com"
          git add index.html
          git commit -m "AIによる最新トレンドへの自動更新" || exit 0
          git push
