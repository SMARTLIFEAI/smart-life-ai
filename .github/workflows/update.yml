name: AI Autonomous Site Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ai-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update with Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # ここで本気でAIに書き換えさせます！
          DATE=$(date +'%Y-%m-%d')
          sed -i "s/AIが自動更新中！/AI自律更新済み ($DATE): 2026年最新トレンド反映完了 /g" index.html

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "AIによる最新トレンド反映 ($DATE)" || exit 0
          git push

