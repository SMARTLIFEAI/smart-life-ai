name: AI Auto Update Content

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gemini Build
        uses: google-gemini/generate-content-action@v1
        id: gemini
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          # 1ファイルに絞ることで確実に成功させます
          prompt: "index.htmlのコードを全行出力してください。Top 10製品は最新のAmazon実名・実画像にすること。中略は禁止。HTMLのみを返せ。"

      - name: Save and Push
        run: |
          echo "${{ steps.gemini.outputs.content }}" > index.html
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@example.com"
          git add index.html
          git commit -m "AI-Bot: index.html 10選フルアップデート成功" || exit 0
          git push origin main


