name: AI Ultimate Auto Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ai-rewrite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gemini AI Full Execution
        uses: google-gemini/generate-content-action@v1
        id: generate
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたは「SMART LIFE AI」の専属フルスタックエンジニアです。
            以下の指示を完遂し、各ファイルの中身を「完全なHTML」で出力せよ。

            【対象】index.html, cleaning.html, kitchen.html, security.html, health.html
            【条件】
            1. 「中略」「...」「以下同様」は厳禁。30製品あるなら30製品すべての<div>タグを書け。
            2. 画像URLは https://m.media-amazon.com/images/I/識別子.jpg の形式を死守。
            3. カテゴリータブ、ブログ、メニューバーを必ず含めろ。
            4. 出力は必ず以下の形式を守れ。
            ---FILE:index.html---
            (ここにコード)
            ---FILE:cleaning.html---
            (ここにコード)

      - name: Physical File Overwrite
        run: |
          # AIの回答からファイルを物理的に切り出して上書きするスクリプト
          echo "${{ steps.generate.outputs.content }}" > raw_output.txt
          python3 -c "
          import os, re
          content = open('raw_output.txt').read()
          files = re.findall(r'---FILE:(.*?)---(.*?)---FILE:', content + '---FILE:', re.DOTALL)
          if not files: # 形式が違った場合の予備
              files = re.findall(r'---FILE:(.*?)---(.*?)$', content, re.DOTALL)
          for filename, code in files:
              with open(filename.strip(), 'w') as f:
                  f.write(code.strip())
          "

      - name: Force Commit and Push
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "ai-bot@users.noreply.github.com"
          git add .
          git commit -m "AIによる120製品フルビルド（中略なし・画像修正完了）" || exit 0
          git push origin main
