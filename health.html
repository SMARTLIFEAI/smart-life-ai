<!DOCTYPE html>
<html lang="ja">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #121212; scroll-behavior: smooth; }
        .tech-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid #eee; }
        
        /* 30個並んでも疲れないグリッド設計 */
        .archive-card { border: 1px solid #f0f0f0; transition: all 0.4s ease; background: #fff; }
        .archive-card:hover { border-color: #000; transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        /* スペック密度を保つデザイン */
        .spec-mini { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #eee; font-size: 0.75rem; }
        .spec-v { font-weight: 700; }
        .spec-l { color: #999; font-weight: 800; text-transform: uppercase; font-size: 0.6rem; }
        
        .btn-buy { background: #121212; color: #fff; font-family: 'JetBrains Mono', monospace; transition: 0.3s; }
        .btn-buy:hover { background: #444; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full tech-nav z-[100] h-14 flex items-center justify-between px-8">
