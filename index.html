<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマート・モノ | 暮らしの知性を比較する</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --白: #ffffff;
            --文字-主: #1d1d1f;
            --文字-副: #86868b;
            --アクセント: #0066cc;
            --境界: #d2d2d7;
            --背景-淡: #f5f5f7;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: var(--白); color: var(--文字-主);
            font-family: 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased;
            overflow-x: hidden; line-height: 1.5;
        }

        /* --- 多重パララックス背景 --- */
        .parallax-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; background: #fcfcfd;
        }
        .bg-layer { position: absolute; width: 100%; height: 200%; top: 0; left: 0; }
        .grid-layer {
            background-image: linear-gradient(var(--背景-淡) 1px, transparent 1px), linear-gradient(90deg, var(--背景-淡) 1px, transparent 1px);
            background-size: 80px 80px; opacity: 0.5;
        }
        .circle-layer {
            background: radial-gradient(circle at 20% 30%, #ebebeb 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #f0f0f0 0%, transparent 50%);
            filter: blur(60px); opacity: 0.6;
        }

        /* --- ナビゲーション --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 9000;
            background: rgba(255,255,255,0.8); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--境界);
        }
        .nav-container {
            max-width: 1024px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; padding: 0 22px; height: 48px;
        }
        .logo { font-weight: 700; font-size: 18px; text-decoration: none; color: var(--文字-主); cursor: pointer; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { font-size: 12px; color: var(--文字-主); text-decoration: none; opacity: 0.8; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { opacity: 1; color: var(--アクセント); }

        /* --- コンテンツ表示制御 --- */
        .page { display: none; padding-top: 48px; min-height: 100vh; animation: fadeIn 0.8s cubic-bezier(0.2, 1, 0.2, 1); }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- トップページ --- */
        .hero { padding: 140px 20px 80px; text-align: center; }
        .hero h1 { font-size: clamp(40px, 8vw, 64px); font-weight: 700; margin: 0; letter-spacing: -0.03em; }
        .hero p { font-size: 21px; color: var(--文字-副); margin-top: 24px; }
        
        .category-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px; max-width: 1100px; margin: 0 auto 120px; padding: 0 20px;
        }
        .cat-card {
            background: rgba(255,255,255,0.7); border: 1px solid var(--境界);
            border-radius: 24px; padding: 60px 40px; text-align: center;
            transition: 0.5s cubic-bezier(0.15, 0, 0.2, 1); cursor: pointer;
            backdrop-filter: blur(12px);
        }
        .cat-card:hover { transform: scale(1.02); border-color: var(--文字-主); background: #fff; }
        .cat-card h3 { margin: 0 0 12px; font-size: 28px; font-weight: 600; letter-spacing: 0.1em; }
        .cat-card p { color: var(--文字-副); font-size: 15px; margin: 0; }

        /* --- カテゴリー比較ページ --- */
        .comp-header { padding: 100px 20px 40px; text-align: center; }
        .comp-header h1 { font-size: 40px; font-weight: 700; }
        
        .comparison-container { max-width: 1024px; margin: 0 auto; padding: 0 22px 120px; }
        .compare-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            padding-bottom: 60px; margin-bottom: 40px; border-bottom: 1px solid var(--境界);
        }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .product-col { text-align: center; transition: opacity 0.4s ease; }
        .prod-img { width: 100%; height: 280px; object-fit: contain; margin-bottom: 30px; }
        
        select {
            width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
            border: 1px solid var(--境界); font-size: 16px; font-weight: 600;
            appearance: none; background: #fff url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>') no-repeat right 15px center;
            background-size: 16px; cursor: pointer; outline: none;
        }

        /* スペック詳細エリア */
        .spec-item { padding: 48px 0; border-top: 1px solid #f0f0f0; }
        .spec-value { font-size: 32px; font-weight: 700; display: block; letter-spacing: -0.01em; }
        .spec-label { font-size: 13px; font-weight: 700; color: var(--アクセント); margin: 8px 0 12px; display: block; text-transform: uppercase; }
        .spec-desc { font-size: 13px; color: var(--文字-副); max-width: 300px; margin: 0 auto; line-height: 1.7; }

        .btn-buy {
            display: inline-block; background: var(--文字-主); color: #fff;
            padding: 10px 24px; border-radius: 980px; text-decoration: none;
            font-size: 14px; font-weight: 500; margin-bottom: 12px; transition: 0.3s;
        }
        .btn-buy:hover { opacity: 0.8; transform: translateY(-1px); }
        .link-more { display: block; color: var(--アクセント); font-size: 14px; text-decoration: none; margin-bottom: 40px; }

        footer { padding: 100px 20px; border-top: 1px solid var(--境界); text-align: center; font-size: 12px; color: var(--文字-副); background: #fff; }
    </style>
</head>
<body>

<div class="parallax-wrapper">
    <div class="bg-layer grid-layer" id="bgGrid"></div>
    <div class="bg-layer circle-layer" id="bgCircle"></div>
</div>

<header>
    <div class="nav-container">
        <div class="logo" onclick="showPage('top')">スマート・モノ</div>
        <nav class="nav-links">
            <a onclick="showPage('cleaning')">掃除機</a>
            <a onclick="showPage('lighting')">照明</a>
            <a onclick="showPage('security')">防犯</a>
        </nav>
    </div>
</header>

<main>
    <div id="top" class="page active">
        <section class="hero">
            <h1>暮らしを、選ぶ。</h1>
            <p>プロの視点とデータで、理想のスマートホームを導き出す。</p>
        </section>
        <div class="category-grid">
            <div class="cat-card" onclick="showPage('cleaning')">
                <h3>CLEANING</h3>
                <p>自動掃除機の最高峰を比較する</p>
            </div>
            <div class="cat-card" onclick="showPage('lighting')">
                <h3>LIGHTING</h3>
                <p>光の質で、暮らしを調律する</p>
            </div>
            <div class="cat-card" onclick="showPage('security')">
                <h3>SECURITY</h3>
                <p>見守る知性で、安心をデザインする</p>
            </div>
        </div>
    </div>

    <div id="categoryView" class="page">
        <section class="comp-header">
            <h1 id="categoryTitle">カテゴリー</h1>
        </section>
        
        <div class="comparison-container">
            <div class="compare-selector">
                <div style="text-align: center;">
                    <select id="selectL" onchange="updateComp('L')"></select>
                </div>
                <div style="text-align: center;">
                    <select id="selectR" onchange="updateComp('R')"></select>
                </div>
            </div>

            <div class="compare-grid">
                <div class="product-col" id="colL"></div>
                <div class="product-col" id="colR"></div>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 スマート・モノ | すべての知性を、あなたの手に。</p>
</footer>

<script>
    // --- 統合データベース ---
    const database = {
        cleaning: {
            title: "掃除を、再定義する。",
            products: {
                roomba: {
                    name: "Roomba Combo 10 Max",
                    img: "https://i.imgur.com/vHq7FfM.png",
                    specs: [
                        { val: "2本", label: "DUAL RUBBER BRUSHES", desc: "独自のゴム製ブラシがゴミを浮かせ、ペットの毛も絡みません。" },
                        { val: "完全自動", label: "DOCK EVOLUTION", desc: "モップの洗浄、乾燥、ゴミ捨て、給水をすべて自動で完結。" }
                    ]
                },
                roborock: {
                    name: "Roborock S8 MaxV Ultra",
                    img: "https://i.imgur.com/K1V3zLd.png",
                    specs: [
                        { val: "10,000Pa", label: "EXTREME SUCTION", desc: "業界最高クラスのパワー。微細な埃も残さず吸引します。" },
                        { val: "AI回避", label: "SMART OBSTACLE", desc: "カメラとセンサーで、床に置いた小物を正確に避けて掃除。" }
                    ]
                }
            }
        },
        lighting: {
            title: "光を、調律する。",
            products: {
                hue: {
                    name: "Philips Hue ホワイトグラデーション",
                    img: "https://i.imgur.com/O6L5UuR.png",
                    specs: [
                        { val: "50,000色", label: "COLOR DYNAMICS", desc: "集中からリラックスまで、白の階調を自由自在に操ります。" },
                        { val: "Zigbee", label: "STABLE CONNECTION", desc: "多数の電球を遅延なく、安定して制御するプロの選択。" }
                    ]
                },
                switchbot: {
                    name: "SwitchBot シーリングライトプロ",
                    img: "https://i.imgur.com/C7K7IuU.png",
                    specs: [
                        { val: "ハブ内蔵", label: "ALL-IN-ONE", desc: "これ一台で他の家電も操作可能。スマートホームの核になります。" },
                        { val: "取付簡単", label: "JAPAN STANDARD", desc: "日本の一般的なソケットにそのまま設置できる安心設計。" }
                    ]
                }
            }
        },
        security: {
            title: "安心を、可視化する。",
            products: {
                ring: {
                    name: "Ring Battery Doorbell Plus",
                    img: "https://i.imgur.com/L4l3C1M.png",
                    specs: [
                        { val: "1536p", label: "HEAD-TO-TOE VIEW", desc: "足元の荷物から来客の顔まで、上下150度の広視野角で確認。" },
                        { val: "双方向音声", label: "REALTIME TALK", desc: "外出先からでも、スマホ越しに配達員と会話が可能。" }
                    ]
                },
                arlo: {
                    name: "Arlo Pro 5",
                    img: "https://i.imgur.com/E8R8XvX.png",
                    specs: [
                        { val: "2K HDR", label: "CRISP DETAIL", desc: "逆光でも鮮明。車のナンバープレートまで読み取れる高解像度。" },
                        { val: "配線不要", label: "WEATHER RESISTANT", desc: "雨風に強く、どこにでも設置できる完全ワイヤレス設計。" }
                    ]
                }
            }
        }
    };

    let currentCategory = '';

    // --- ページ遷移ロジック ---
    function showPage(pageId) {
        // 全ページ非表示
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        if (pageId === 'top') {
            document.getElementById('top').classList.add('active');
        } else {
            currentCategory = pageId;
            const view = document.getElementById('categoryView');
            const data = database[pageId];
            
            // カテゴリー情報更新
            document.getElementById('categoryTitle').innerText = data.title;
            
            // セレクター初期化
            const keys = Object.keys(data.products);
            const sL = document.getElementById('selectL');
            const sR = document.getElementById('selectR');
            sL.innerHTML = sR.innerHTML = keys.map(k => `<option value="${k}">${data.products[k].name}</option>`).join('');
            sR.selectedIndex = 1;

            view.classList.add('active');
            updateComp('L');
            updateComp('R');
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
        history.pushState({ page: pageId }, null, `#${pageId}`);
    }

    // --- 比較更新ロジック ---
    function updateComp(side) {
        const val = document.getElementById(`select${side}`).value;
        const data = database[currentCategory].products[val];
        const col = document.getElementById(`col${side}`);
        
        col.style.opacity = 0;
        setTimeout(() => {
            col.innerHTML = `
                <img src="${data.img}" class="prod-img">
                <a href="#" class="btn-buy">購入</a>
                <a href="#" class="link-more">さらに詳しく ＞</a>
                ${data.specs.map(s => `
                    <div class="spec-item">
                        <span class="spec-value">${s.val}</span>
                        <span class="spec-label">${s.label}</span>
                        <p class="spec-desc">${s.desc}</p>
                    </div>
                `).join('')}
            `;
            col.style.opacity = 1;
        }, 300);
    }

    // --- ブラウザ戻る対応 ---
    window.onpopstate = (e) => {
        const page = (e.state && e.state.page) ? e.state.page : 'top';
        showPage(page);
    };

    // --- パララックス ---
    window.addEventListener('scroll', () => {
        const y = window.pageYOffset;
        document.getElementById('bgGrid').style.transform = `translateY(${y * 0.1}px)`;
        document.getElementById('bgCircle').style.transform = `translateY(${y * 0.15}px)`;
    });

    // 初期起動
    const hash = window.location.hash.replace('#', '');
    showPage(hash || 'top');
</script>

</body>
</html>
