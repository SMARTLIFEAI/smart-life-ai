<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SMART LIFE AI | 効率化の頂点へ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --bg-color: #f2f2f7; --card-bg: #ffffff; --accent-blue: #007aff; --text-main: #1c1c1e; --text-sub: #8e8e93; --border: #e5e5ea; }
        body { font-family: "Inter", "Hiragino Sans", sans-serif; margin: 0; background: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
        header { background: #fff; padding: 10px 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 900; box-shadow: 0 1px 10px rgba(0,0,0,0.05); gap: 10px; }
        .logo { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; flex: 1; cursor: pointer; text-decoration: none; color: #000; }
        .search-bar { width: 100%; border: none; background: var(--bg-color); padding: 8px 12px; border-radius: 10px; font-size: 14px; outline: none; }
        .hero { padding: 60px 20px; text-align: center; background: #fff; }
        .hero h1 { font-size: 28px; font-weight: 900; margin-bottom: 15px; }
        .compare-grid { display: flex; gap: 20px; padding: 20px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .compare-grid::-webkit-scrollbar { display: none; }
        .card { width: 280px; min-width: 280px; background: #fff; border-radius: 20px; scroll-snap-align: start; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 200px; object-fit: contain; padding: 20px; box-sizing: border-box; }
        .card-body { padding: 20px; }
        .card-title { font-size: 18px; font-weight: 800; margin: 0 0 5px; }
        .card-price { font-size: 16px; font-weight: 700; color: var(--accent-blue); margin-bottom: 15px; }
        .btn-buy { display: block; background: #000; color: #fff; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .btn-buy:hover { background: #333; }
        .blog-section { padding: 20px; max-width: 800px; margin: 0 auto; }
        .blog-card { background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 6px solid #000; }
        .chat-container { padding: 40px 20px; max-width: 600px; margin: 0 auto; }
        .chat-box { background: #fff; border-radius: 24px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        #chat-messages { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; }
        .bot { background: var(--bg-color); align-self: flex-start; }
        .user { background: var(--accent-blue); color: #fff; align-self: flex-end; }
        footer { padding: 40px; text-align: center; color: var(--text-sub); font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">SMART LIFE AI</a>
    <div style="flex:2;"><input type="text" class="search-bar" placeholder="未来の道具を探す..."></div>
</header>

<section class="hero">
    <h1>その「家事」は、AIに譲れる。</h1>
    <p>2026年、私たちの時間はもっと自由になれるはずです。</p>
</section>

<div style="padding: 20px 20px 0; font-weight: 800;">厳選：今すぐ導入すべき3選</div>
<div class="compare-grid" id="product-list"></div>

<div class="blog-section">
    <div style="font-weight: 800; margin-bottom: 15px;">ライフスタイル・ハック</div>
    <article class="blog-card">
        <div style="font-size: 12px; color: var(--text-sub);">FEATURED ARTICLE</div>
        <h2 style="font-size: 20px;">「名もなき家事」を抹殺する。<br>2026年版・自動化のロードマップ</h2>
        <p style="font-size: 14px; color: #444;">洗剤の補充、鍵の開け閉め、床の拭き掃除。これらはすべて、あなたがやる必要のない仕事です。</p>
        <a href="article1.html" style="color:#000; font-weight:800; text-decoration:none; border-bottom: 2px solid #000;">メソッドを詳しく見る →</a>
    </article>
</div>

<section class="chat-container">
    <div class="chat-box">
        <div id="chat-messages">
            <div class="bubble bot">🤖 どんな「面倒」を解決したいですか？予算に合わせて提案します。</div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="text" id="chat-input" style="flex:1; border:none; background:#eee; padding:10px; border-radius:20px; outline:none;" placeholder="例：掃除を楽にしたい">
            <button onclick="sendMessage()" style="background:var(--accent-blue); color:#fff; border:none; padding:10px 20px; border-radius:20px; cursor:pointer;">送信</button>
        </div>
    </div>
</section>

<footer>&copy; 2026 SMART LIFE AI. All Rights Reserved.</footer>

<script>
    const products = [
        {
            tag: "Cleaning",
            title: "Roborock S8 MaxV Ultra",
            price: "¥228,000",
            img: "https://m.media-amazon.com/images/I/61NfXpY9p2L._AC_SL1500_.jpg",
            link: "https://www.amazon.co.jp/s?k=Roborock+S8+MaxV+Ultra"
        },
        {
            tag: "Security",
            title: "SwitchBot Lock Pro",
            price: "¥15,980",
            img: "https://m.media-amazon.com/images/I/51-vS2D6h1L._AC_SL1200_.jpg",
            link: "https://www.amazon.co.jp/s?k=SwitchBot+Lock+Pro"
        },
        {
            tag: "Kitchen",
            title: "T-fal Cook4me Touch",
            price: "¥45,000",
            img: "https://m.media-amazon.com/images/I/61S-r5pBshL._AC_SL1500_.jpg",
            link: "https://www.amazon.co.jp/s?k=T-fal+Cook4me+Touch"
        }
    ];

    const list = document.getElementById('product-list');
    products.forEach(p => {
        list.innerHTML += `<div class="card">
            <img src="${p.img}" class="card-img">
            <div class="card-body">
                <div style="font-size:10px; color:var(--accent-blue); font-weight:bold;">${p.tag}</div>
                <div class="card-title">${p.title}</div>
                <div class="card-price">${p.price}</div>
                <a href="${p.link}" target="_blank" class="btn-buy">詳細をチェック</a>
            </div>
        </div>`;
    });

    function sendMessage() {
        const input = document.getElementById("chat-input");
        const msg = document.getElementById("chat-messages");
        if (!input.value) return;
        msg.innerHTML += `<div class="bubble user">${input.value}</div>`;
        const val = input.value;
        input.value = "";
        setTimeout(() => {
            let res = "そのお悩みなら、まずはRoborockの導入をおすすめします。";
            if(val.includes("キッチン")) res = "料理の自動化ならCook4meが最強です。";
            msg.innerHTML += `<div class="bubble bot">🤖 ${res}</div>`;
            msg.scrollTop = msg.scrollHeight;
        }, 800);
    }
</script>
</body>
</html>
