<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME ARCHIVE | 全世界スマート家電図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .category-card { background: #1c1c1e; border-radius: 24px; padding: 24px; border: 1px solid #2c2c2e; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .apple-badge { background: #2c2c2e; color: #0a84ff; padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="font-bold tracking-tighter text-2xl">SMART HOME ARCHIVE</div>
            <div class="text-[10px] text-gray-500 tracking-[0.2em] uppercase">World Wide Inventory</div>
        </div>
    </nav>

    <main class="pt-32 px-6 max-w-7xl mx-auto">
        <header class="mb-20">
            <h1 class="text-6xl font-bold mb-4">全ての家電に、知能を。</h1>
            <p class="text-gray-500 text-xl">AIが全世界の最新デバイスを24時間監視し、リストを更新し続けます。</p>
        </header>

        <section class="mb-16">
            <div class="flex items-center space-x-4 mb-8">
                <h2 class="text-2xl font-bold">Kitchen Intelligence</h2>
                <span class="apple-badge">AUTO UPDATING</span>
            </div>
            <div id="kitchen-list" class="product-grid italic text-gray-600">AIがキッチン家電をスキャン中...</div>
        </section>

        <section class="mb-16">
            <div class="flex items-center space-x-4 mb-8">
                <h2 class="text-2xl font-bold">Cleaning & Laundry</h2>
                <span class="apple-badge">AUTO UPDATING</span>
            </div>
            <div id="cleaning-list" class="product-grid italic text-gray-600">最新のロボット掃除機を検索中...</div>
        </section>

        <section class="mb-16">
            <div class="flex items-center space-x-4 mb-8">
                <h2 class="text-2xl font-bold">Environment & Security</h2>
                <span class="apple-badge">AUTO UPDATING</span>
            </div>
            <div id="security-list" class="product-grid italic text-gray-600">家の守りを固めるデバイスを収集中...</div>
        </section>
    </main>

    <div class="fixed bottom-10 right-10">
        <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
    </div>

</body>
</html>
