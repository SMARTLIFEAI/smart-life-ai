<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME AI CONCIERGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --白: #ffffff;
            --文字-主: #1d1d1f;
            --文字-副: #86868b;
            --アクセント: #0066cc;
            --境界: #d2d2d7;
            --背景-淡: #f5f5f7;
            --透過-白: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--白); color: var(--文字-主);
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* --- Apple風ナビゲーション (中央寄せ + 右端メニュー) --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 10000;
            background: var(--透過-白); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--境界); height: 48px;
        }
        .nav-container {
            max-width: 1000px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; padding: 0 22px; height: 100%;
        }
        .logo { font-weight: 700; font-size: 14px; letter-spacing: 0.1em; cursor: pointer; }
        
        /* 中央メニュー */
        .center-links {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px;
        }
        .center-links a {
            font-size: 12px; color: var(--文字-主); text-decoration: none;
            opacity: 0.8; transition: 0.3s; cursor: pointer;
        }
        .center-links a:hover { opacity: 1; }

        /* 右端三本線 */
        .menu-icon {
            cursor: pointer; display: flex; flex-direction: column; gap: 4px; z-index: 10001;
        }
        .menu-icon span {
            width: 18px; height: 1px; background: var(--文字-主); transition: 0.3s;
        }

        /* Apple風 全画面メニュー */
        .overlay-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--白); z-index: 9999; display: none;
            flex-direction: column; padding: 80px 40px; animation: menuIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes menuIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .overlay-menu.active { display: flex; }
        .overlay-link { font-size: 28px; font-weight: 600; text-decoration: none; color: var(--文字-主); margin-bottom: 20px; }

        /* --- ページ表示制御 --- */
        .page { display: none; padding-top: 48px; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- カタログ & 詳細ページ --- */
        .hero-section { text-align: center; padding: 80px 20px; }
        .hero-section h1 { font-size: 56px; font-weight: 700; }
        
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; max-width: 1100px; margin: 0 auto; padding: 40px 20px;
        }
        .card {
            background: #fff; border-radius: 20px; padding: 40px; text-align: center;
            border: 1px solid var(--境界); transition: 0.4s; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; }

        /* 詳細ページ (Detail View) */
        .detail-view { padding: 100px 20px; max-width: 900px; margin: 0 auto; }
        .detail-hero { font-size: 48px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .detail-story { font-size: 24px; color: var(--文字-副); text-align: center; margin-bottom: 60px; }
        .spec-table { width: 100%; border-collapse: collapse; margin-top: 40px; }
        .spec-table td { padding: 20px; border-bottom: 1px solid var(--境界); }
        .spec-key { font-weight: 600; width: 30%; color: var(--文字-副); }

        .btn-buy { background: var(--アクセント); color: #fff; padding: 12px 30px; border-radius: 30px; text-decoration: none; display: inline-block; margin-top: 20px; }

    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo" onclick="showPage('top')">SMART HOME AI CONCIERGE</div>
        
        <nav class="center-links">
            <a onclick="showPage('cleaning')">掃除機</a>
            <a onclick="showPage('lighting')">照明</a>
            <a onclick="showPage('security')">防犯</a>
        </nav>

        <div class="menu-icon" onclick="toggleMenu()">
            <span id="b1"></span><span id="b2"></span>
        </div>
    </div>
</header>

<div class="overlay-menu" id="overlayMenu">
    <a class="overlay-link" onclick="showPage('cleaning')">掃除機 一覧</a>
    <a class="overlay-link" onclick="showPage('lighting')">照明 一覧</a>
    <a class="overlay-link" onclick="showPage('security')">防犯 一覧</a>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--境界);">
    <a class="overlay-link" style="font-size: 18px; color: var(--アクセント);">AIコンシェルジュに相談する</a>
</div>

<main id="mainContent">
    <div id="top" class="page active">
        <section class="hero-section">
            <h1>暮らしを、選ぶ。</h1>
            <p>理想の知性を、あなたの家へ。</p>
        </section>
        <div class="product-grid">
            <div class="card" onclick="showPage('cleaning')"><h2>CLEANING</h2><p>掃除機の一覧へ</p></div>
            <div class="card" onclick="showPage('lighting')"><h2>LIGHTING</h2><p>照明の一覧へ</p></div>
        </div>
    </div>

    <div id="listPage" class="page">
        <div class="hero-section"><h1 id="listTitle"></h1></div>
        <div id="listGrid" class="product-grid"></div>
    </div>

    <div id="detailPage" class="page">
        <div class="detail-view" id="detailContent"></div>
    </div>
</main>

<script>
    // 圧倒的な製品データベース (一部抜粋、実際にはここを全20機種に拡充)
    const db = {
        cleaning: [
            { id: 'r10', name: "Roomba Combo 10 Max", price: "197,800", story: "掃除を、忘れるための究極。", desc: "モップ洗浄から乾燥まで完全に自立した知性が、あなたの床を毎日、新品の状態に保ちます。", specs: {"吸引力": "iRobot史上最強", "自動洗浄": "AutoWash搭載", "回避能力": "PrecisionVision AI", "モップ": "完全自動昇降"} },
            { id: 's8', name: "Roborock S8 MaxV Ultra", price: "188,000", story: "障害物を、思考で超える。", desc: "業界最強の吸引力と、壁際1mmまで磨き上げるサイドモップ。徹底した清掃が、ここから始まります。", specs: {"吸引力": "10,000Pa", "モップ": "高速振動＋回転", "回避能力": "3Dストラクチャードライト", "静音性": "極めて高い"} },
            { id: 'x10', name: "Eufy X10 Pro Omni", price: "99,990", story: "最高の体験を、すべての人へ。", desc: "プレミアムな機能を、信じられない価格で。Ankerが提案する、新しい掃除のスタンダードです。", specs: {"吸引力": "8,000Pa", "自動ゴミ収集": "最大60日分", "AI回避": "100種類以上の障害物", "価格": "圧倒的コスパ"} }
        ],
        lighting: [
            { id: 'hue', name: "Philips Hue フルカラー", price: "16,800", story: "光は、感情を描き出す。", desc: "5万色の白と1,600万の色。あなたの気分に合わせて、部屋の空気を一瞬で塗り替えます。", specs: {"カラー": "1,600万色", "接続": "Zigbee / Bluetooth", "同期": "映画・音楽対応", "寿命": "約25,000時間"} }
        ]
    };

    function toggleMenu() {
        const m = document.getElementById('overlayMenu');
        m.classList.toggle('active');
        document.getElementById('b1').style.transform = m.classList.contains('active') ? 'rotate(45deg) translateY(4px)' : 'none';
        document.getElementById('b2').style.transform = m.classList.contains('active') ? 'rotate(-45deg) translateY(-4px)' : 'none';
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('overlayMenu').classList.remove('active');
        
        if(id === 'top') {
            document.getElementById('top').classList.add('active');
        } else if (db[id]) {
            // リスト表示
            document.getElementById('listTitle').innerText = id === 'cleaning' ? '掃除機' : id === 'lighting' ? '照明' : '防犯';
            let html = '';
            db[id].forEach(p => {
                html += `<div class="card" onclick="showDetail('${id}', '${p.id}')">
                    <h2>${p.name}</h2>
                    <p class="price">${p.price}円〜</p>
                    <span style="color:var(--アクセント)">詳しく見る ＞</span>
                </div>`;
            });
            document.getElementById('listGrid').innerHTML = html;
            document.getElementById('listPage').classList.add('active');
        }
        window.scrollTo(0,0);
    }

    function showDetail(cat, pid) {
        const p = db[cat].find(x => x.id === pid);
        let specHtml = '';
        for(let k in p.specs) {
            specHtml += `<tr><td class="spec-key">${k}</td><td>${p.specs[k]}</td></tr>`;
        }
        document.getElementById('detailContent').innerHTML = `
            <div class="detail-hero">${p.name}</div>
            <div class="detail-story">${p.story}</div>
            <p style="line-height:1.8; margin-bottom:40px;">${p.desc}</p>
            <a href="#" class="btn-buy">購入 - ${p.price}円</a>
            <table class="spec-table">${specHtml}</table>
        `;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('detailPage').classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
