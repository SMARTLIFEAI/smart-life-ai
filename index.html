<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART LIFE AI | Top 10 Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1d1d1f; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); }
        .product-card { background: #f5f5f7; border-radius: 24px; padding: 24px; transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-8px); background: #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.08); }
        .chat-pulse { position: relative; }
        .chat-pulse::after { content: ''; position: absolute; width: 10px; height: 10px; background: #34c759; border-radius: 50%; right: -2px; top: -2px; border: 2px solid #000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav border-b border-gray-100 h-14 flex items-center justify-between px-8">
        <div class="font-bold text-2xl italic tracking-tighter">SMART LIFE AI</div>
        <div class="hidden md:flex space-x-8 text-[10px] font-bold uppercase tracking-widest text-gray-400">
            <a href="cleaning.html">Cleaning</a>
            <a href="kitchen.html">Kitchen</a>
            <a href="security.html">Security</a>
            <a href="health.html">Health</a>
        </div>
    </nav>

    <header class="pt-40 pb-20 text-center bg-white">
        <h1 class="text-7xl font-bold tracking-tight mb-6 leading-tight">家事を、<br>AIに解放する。</h1>
        <p class="text-gray-400 text-lg">AIが選ぶ、今この瞬間の「究極の10台」</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-3xl font-bold mb-12 italic tracking-tighter">The Top 10</h2>
        <div id="top-10-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
            <div class="product-card text-gray-300 italic">Scanning Top 10 items...</div>
        </div>
    </section>

    <section class="bg-[#f5f5f7] py-24">
        <div class="max-w-6xl mx-auto px-8">
            <h2 class="text-4xl font-bold mb-12 italic tracking-tighter text-gray-300">Journal</h2>
            <div id="blog-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <a href="article1.html" class="bg-white p-10 rounded-[2.5rem] hover:shadow-xl transition-all">
                    <p class="text-blue-600 font-bold text-[10px] mb-4 uppercase tracking-[0.2em]">Latest</p>
                    <h3 class="text-3xl font-bold mb-4">2026年、AIが変える「家事ゼロ」の暮らし</h3>
                    <p class="text-gray-400 font-light">自律型ロボットとGemini 3 Flashが連携する未来について...</p>
                </a>
            </div>
        </div>
    </section>

    <div class="fixed bottom-10 right-10 z-50">
        <button class="bg-black text-white px-8 py-4 rounded-full shadow-2xl font-bold text-xs chat-pulse uppercase tracking-widest">AI Concierge</button>
    </div>

</body>
</html>
