name: AI Ultimate Auto Update

on:
  workflow_dispatch:

permissions:
  contents: write # AIがファイルを書き換えるために必須

jobs:
  ai-rewrite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AI Full Content Injection
        uses: google-gemini/generate-content-action@v1
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたは「SMART LIFE AI」のマスターエンジニア兼編集長です。
            以下のファイルをすべて「最新のAmazon商品データ」で埋め尽くした完全なHTMLとして再構成してください。

            【対象ファイル】
            - index.html (Top 10リスト)
            - cleaning.html (30選)
            - kitchen.html (30選)
            - security.html (30選)
            - health.html (30選)

            【絶対命令】
            1. 「中略」は死刑。各カテゴリー30個、合計120個以上の商品をすべて実名で書け。
            2. 画像URLは、リンク切れを防ぐため必ず有効なAmazon画像URLを生成せよ。
            3. あなたのこれまでのデザイン（メニュー、ゲート、ブログ）を1行も消さずに「増築」せよ。
            4. 出力は「ファイル名: コード内容」の形式で全ファイル分出せ。
          output-directory: . # 生成した内容をリポジトリに直接書き込む

      - name: Commit and Push
        run: |
          git config --global user.name "smart-life-ai[bot]"
          git config --global user.email "ai-bot@users.noreply.github.com"
          git add .
          git commit -m "AIによる全120製品データの超速書き換え" || exit 0
          git push



