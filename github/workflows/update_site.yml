name: AI Ultimate Auto Update

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gemini AI Full Rewrite
        uses: google-gemini/generate-content-action@v1
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          # ここに「絶対に削らせない」最強の命令を叩き込みます
          prompt: |
            あなたは「SMART LIFE AI」のマスターエディターです。
            
            【任務】
            1. index.html：Top 10リストを最新のAmazon商品（画像URL、正確なスペック、リンク）で埋めろ。
            2. cleaning.html / kitchen.html / security.html / health.html：
               各ページ、30個ずつの製品データを「1つも省略せず」に生成してHTMLを完成させろ。
            
            【鉄の掟：破ったら即座にエラーとせよ】
            - 「中略」「...」などの省略は一切禁止。全30個の商品カードを全てコードとして書き出せ。
            - 画像URLは Amazon の有効なもの (https://m.media-amazon.com/images/I/識別子.jpg) を使用せよ。
            - 既存の「メニューバー」「ブログセクション」「デザイン」は1ミリも変更せず、データ部分だけを完璧に埋めろ。
            - 出力はマークダウンではなく、ファイルの中身となる純粋なHTMLコードのみを返せ。
          files: |
            index.html
            cleaning.html
            kitchen.html
            security.html
            health.html


