name: AI Ultimate Auto Update  # ここを画面の表示名に合わせました

on:
  workflow_dispatch: # これで「Run workflow」ボタンが出ます

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: AI Processing
        uses: google-github-actions/setup-gcloud@v2 # もしくは特定のAI連携Action
        # ここにプロンプトを直接埋め込みます
        with:
          prompt: |
            【SMART LIFE AI 編集命令】
            1. index.htmlの "top-10-list" を2026年最新のAmazon10選で埋めろ。
            2. 各カテゴリーページ(cleaning.html等)の "archive-list" を30選で埋めろ。
            
            【絶対厳守・鉄の掟】
            - メニューバー、クイックバナー、比較表のスタイルを絶対に削るな。
            - 以前から積み上げてきた全機能を1ミリも消さずに、中身だけを最新データに増築せよ。
            - Amazon個別リンク(dp/...)と実写画像URLを正確に記述せよ。
            
            完了したら全ファイルを保存し、コミットせよ。

